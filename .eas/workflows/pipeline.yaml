name: CI/CD Pipeline

on:
  push:
    branches:
      - main

defaults:
  tools:
    node: "24"

jobs:
  test:
    defaults:
      run:
        working_directory: ./

    steps:
      - uses: eas/checkout
      - uses: eas/install_node_modules

      - name: Run unit tests
        run: npm test

  build_android:
    needs: [test]
    type: build

    params:
      platform: android